openapi: 3.0.3
info:
  title: M72 Webhook Manager API
  version: 1.0.0
  description: Webhook endpoint lifecycle, replay testing, deliveries, and analytics. Includes owner routes used by M86 AFR-013 control-plane endpoints.
servers:
  - url: /
security:
  - bearerAuth: []
tags:
  - name: Health
  - name: Webhooks
  - name: Deliveries
  - name: Analytics
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: m72Health
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
  /healthz:
    get:
      tags: [Health]
      summary: Health check alias
      operationId: m72Healthz
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
  /readyz:
    get:
      tags: [Health]
      summary: Readiness check
      operationId: m72Readyz
      responses:
        '200':
          description: Service ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
  /api/v1/webhooks:
    post:
      tags: [Webhooks]
      summary: Create webhook endpoint
      operationId: m72CreateWebhook
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
      responses:
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/v1/webhooks/{id}:
    get:
      tags: [Webhooks]
      summary: Get webhook endpoint
      operationId: m72GetWebhook
      parameters:
        - $ref: '#/components/parameters/WebhookID'
      responses:
        '200':
          description: Webhook endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Webhooks]
      summary: Update webhook endpoint
      operationId: m72UpdateWebhook
      description: Owner contract called by M86 POST /api/admin/v1/integrations/webhooks/{webhook_id}/disable.
      parameters:
        - $ref: '#/components/parameters/WebhookID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWebhookRequest'
      responses:
        '200':
          description: Webhook endpoint updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Webhooks]
      summary: Delete webhook endpoint
      operationId: m72DeleteWebhook
      parameters:
        - $ref: '#/components/parameters/WebhookID'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Webhook endpoint deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/v1/webhooks/{id}/test:
    post:
      tags: [Webhooks]
      summary: Replay/test webhook delivery
      operationId: m72TestWebhook
      description: Owner contract called by M86 POST /api/admin/v1/integrations/webhooks/{webhook_id}/replay.
      parameters:
        - $ref: '#/components/parameters/WebhookID'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestWebhookRequest'
      responses:
        '200':
          description: Webhook delivery test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestResultEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /api/v1/webhooks/{id}/deliveries:
    get:
      tags: [Deliveries]
      summary: List webhook deliveries
      operationId: m72ListDeliveries
      description: Owner contract called by M86 GET /api/admin/v1/integrations/webhooks/{webhook_id}/deliveries.
      parameters:
        - $ref: '#/components/parameters/WebhookID'
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        '200':
          description: Delivery list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryListEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/webhooks/{id}/analytics:
    get:
      tags: [Analytics]
      summary: Get webhook analytics snapshot
      operationId: m72GetAnalytics
      description: Owner contract called by M86 GET /api/admin/v1/integrations/webhooks/{webhook_id}/analytics.
      parameters:
        - $ref: '#/components/parameters/WebhookID'
      responses:
        '200':
          description: Analytics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/v1/webhooks/{id}/enable:
    post:
      tags: [Webhooks]
      summary: Enable webhook endpoint
      operationId: m72EnableWebhook
      parameters:
        - $ref: '#/components/parameters/WebhookID'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Webhook endpoint enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    WebhookID:
      in: path
      name: id
      required: true
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string }
      description: Required for mutating operations. Backed by 7-day request-hash idempotency store.
  schemas:
    SuccessEnvelope:
      type: object
      properties:
        status: { type: string, example: success }
        message: { type: string }
        data: {}
    CreateWebhookRequest:
      type: object
      required: [endpoint_url, event_types]
      properties:
        endpoint_url: { type: string, format: uri }
        event_types:
          type: array
          items: { type: string }
          minItems: 1
        batch_mode_enabled: { type: boolean }
        batch_size:
          type: integer
          minimum: 1
          maximum: 100
        batch_window_seconds:
          type: integer
          minimum: 5
          maximum: 300
        rate_limit_per_minute:
          type: integer
          minimum: 1
          maximum: 100
    UpdateWebhookRequest:
      type: object
      properties:
        event_types:
          type: array
          items: { type: string }
        batch_mode_enabled: { type: boolean }
        batch_size:
          type: integer
          minimum: 1
          maximum: 100
        batch_window_seconds:
          type: integer
          minimum: 5
          maximum: 300
        rate_limit_per_minute:
          type: integer
          minimum: 1
          maximum: 100
        status:
          type: string
          enum: [active, disabled]
    TestWebhookRequest:
      type: object
      properties:
        payload: {}
    Webhook:
      type: object
      properties:
        webhook_id: { type: string }
        endpoint_url: { type: string }
        event_types:
          type: array
          items: { type: string }
        status: { type: string }
        signing_secret: { type: string }
        batch_mode_enabled: { type: boolean }
        batch_size: { type: integer }
        batch_window_seconds: { type: integer }
        rate_limit_per_minute: { type: integer }
        consecutive_failures: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TestResult:
      type: object
      properties:
        delivery_id: { type: string }
        webhook_id: { type: string }
        status: { type: string }
        http_status: { type: integer }
        latency_ms: { type: integer }
        timestamp: { type: string, format: date-time }
    Delivery:
      type: object
      properties:
        delivery_id: { type: string }
        webhook_id: { type: string }
        original_event_id: { type: string }
        original_event_type: { type: string }
        http_status: { type: integer }
        latency_ms: { type: integer }
        retry_count: { type: integer }
        delivered_at: { type: string, format: date-time }
        is_test: { type: boolean }
        success: { type: boolean }
    Analytics:
      type: object
      properties:
        total_deliveries: { type: integer }
        successful_deliveries: { type: integer }
        failed_deliveries: { type: integer }
        success_rate: { type: number }
        avg_latency_ms: { type: number }
        p95_latency_ms: { type: number }
        p99_latency_ms: { type: number }
        by_event_type:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/EventMetrics'
    EventMetrics:
      type: object
      properties:
        total: { type: integer }
        success: { type: integer }
        failed: { type: integer }
        avg_latency: { type: number }
    WebhookEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Webhook' }
    TestResultEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/TestResult' }
    DeliveryListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Delivery' }
    AnalyticsEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Analytics' }
    ErrorResponse:
      type: object
      properties:
        status: { type: string, example: error }
        code: { type: string }
        message: { type: string }
        request_id: { type: string }
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            request_id: { type: string }
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Missing or invalid auth
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Insufficient access
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Idempotency or state conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
